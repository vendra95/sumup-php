name: Bug report
description: Report a problem in the SumUp PHP SDK.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and what you expected to happen.
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: code
    attributes:
      label: Relevant code or error output
      description: Paste a minimal code sample, stack trace, or logs if available.
      render: php
  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      placeholder: e.g. 0.9.0
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: e.g. 8.3.8
  - type: input
    id: framework
    attributes:
      label: Framework or runtime
      placeholder: e.g. Laravel 11, Symfony 7, plain PHP
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 15.5, Ubuntu 24.04
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
